name: Update Fear & Greed

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

jobs:

  update:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python -m playwright install chromium

      - run: python fetch.py

      - name: Commit

        run: |

          if [ ! -f data.json ]; then
            echo "No data"
            exit 1
          fi

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add data.json

          if git diff --cached --quiet
          then
              echo "No changes"
          else
              git commit -m "update"
              git push
          fi
